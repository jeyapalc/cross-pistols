<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cross Pistols Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1117; --ui:#e7ebf2; --accent:#2bd97f;
    --count-opacity:.20;
    --par-seconds:22;
    --delay-min:4;
    --delay-max:12;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ui);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column
  }
  header{padding:1rem;display:flex;gap:.75rem;align-items:center}
  #courseSelection { margin-right: auto; }
  #courseSelection button {
    background: transparent;
    color: var(--ui);
    opacity: 0.6;
    border: 1px solid var(--ui);
  }
  #courseSelection button.active {
    background: var(--accent);
    color: #062f1d;
    opacity: 1;
    border-color: var(--accent);
  }
  button{
    background:var(--accent);color:#062f1d;border:0;padding:.8rem 1rem;
    border-radius:.8rem;font-weight:800;cursor:pointer
  }
  button:disabled{opacity:.55;cursor:not-allowed}
  #status{font-weight:800}
  main{flex:1;display:grid;place-items:center}
  #stageInfo {
    padding: 0 1rem 1rem;
    text-align: center;
    color: #cfd6e1;
    transition: opacity .3s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
  }
  #stageInfo h2 { margin: 0 0 1rem; font-size: 2rem; color: var(--ui); }
  #stageInfo p { margin: 0; font-size: 20vh; line-height: 1; font-weight: 800; }

  #continueScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: rgba(0,0,0,0.7);
    text-align: center;
    z-index: 300;
  }
  #continueScreen h2 { font-size: 5rem; margin: 0; }
  #continueScreen #continueTimer { font-size: 3rem; margin: 1rem; }
  #continueScreen button { min-width: 120px; }

  body.cinema-active header button {
    opacity: 0.3;
    pointer-events: none;
  }

  #cornerStage {
    position: fixed;
    bottom: 1rem;
    left: 1.5rem;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--ui);
    opacity: 0;
    transition: opacity .3s;
    z-index: 200;
  }


  /* Stage with depth so timer looks projected on the floor */
  #stage{
    position:relative;width:min(66vmin,88vw);height:min(86vmin,82vh);
    display:grid;place-items:center;perspective:2200px;transform-style:preserve-3d;
  }
  /* Floor timer */
  #big{
    position:absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Archivo Black', sans-serif;
    font-weight:900;
    font-size:min(108vmin, 84vh);
    line-height:.8;
    letter-spacing:-.03em;
    color:rgba(60, 60, 60, 0.3);
    user-select:none;
    pointer-events:none;
    text-shadow:none;
    z-index:0;
    transition: color .3s, text-shadow .3s, opacity .3s, filter .3s;
    filter: blur(1px);
  }
  #big.warning {
    -webkit-text-stroke-width: 1px;
    -webkit-text-stroke-color: #ff0000;
  }
  .hidden {
    display: none !important;
  }
  #progressBar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background-color: transparent;
    transition: width 0.1s linear, background-color 0.3s ease;
    z-index: 200;
  }

  .turner{width:100%;height:100%;position:relative;z-index:1;perspective:1400px}
  .flipper{
    position:absolute;inset:0;transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.7,.2,1);
  }
  .face{position:absolute;inset:0;display:grid;place-items:center;backface-visibility:hidden}
  .back{transform:rotateY(180deg);}
  .away .flipper{transform:rotateY(180deg)}
  .facing .flipper{transform:rotateY(0deg)}

  .paper{
    max-width:92%;max-height:96%;
    filter:drop-shadow(0 28px 60px rgba(0,0,0,.55));
    transform-origin:50% 10%;
  }
  .sway{animation:sway 3.6s ease-in-out infinite alternate}
  @keyframes sway{0%{transform:rotateZ(-.7deg)}100%{transform:rotateZ(.7deg)}}
</style>
</head>
<body class="away">
<header>
  <div id="courseSelection">
    <button id="instructorBtn" class="active">Instructor</button>
    <button id="memberBtn">Regular Member</button>
  </div>
  <button id="start">Start Course</button>
  <button id="stop" disabled>Stop/Reset</button>
  <label><input type="checkbox" id="mute">Mute beeps</label>
  <div id="status" aria-live="polite">Idle</div>
</header>

<main>
  <div id="cornerStage"></div>
  <div id="stageInfo"></div>
  <section id="stage" aria-label="training lane">
    <div id="big" class="hidden">–</div>
    <div class="turner away" id="turner">
      <div class="flipper" id="flipper">
        <div class="face front"><img id="targetImg" class="paper" alt="target"/></div>
        <div class="face back"></div>
      </div>
    </div>
  </section>
  <div id="continueScreen" class="hidden">
    <h2>CONTINUE?</h2>
    <div id="continueTimer">8</div>
    <div>
      <button id="continueYes">Yes</button>
      <button id="continueNo">No</button>
    </div>
  </div>
</main>

<div id="progressBar"></div>

<script>
(()=> {
  /* Point to PNGs you uploaded in /assets */
  const TARGETS = [
    "green.png",
    "blue.png"
  ];

  const INSTRUCTOR_COF = [
    {
      name: "Stage 1",
      instructions: ["Stage 1", "15 meters", "From holster", "4 standing, 4 kneeling", "22 seconds", "Shooter be ready!"],
      parTime: 22,
      type: 'single_exposure'
    },
    {
      name: "Stage 2",
      instructions: ["Stage 2", "7 meters", "From high ready", "2 rounds, reload, 2 rounds", "8 seconds", "Shooter be ready!"],
      parTime: 8,
      type: 'reload_prompt',
      prompt_start: 5, // time remaining to start prompt
      prompt_end: 3    // time remaining to end prompt
    },
    {
      name: "Stage 3",
      instructions: ["Stage 3", "5 meters", "From holster", "2 centre mass, 1 head", "5 seconds per rep", "3 repetitions", "Shooter be ready!"],
      parTime: 5,
      reps: 3,
      delay_min: 3.5,
      delay_max: 6,
      type: 'multi_rep'
    },
    {
      name: "Stage 4",
      instructions: ["Stage 4", "25 meters", "From holster", "3 standing", "3 standing, from cover", "3 kneeling, from cover", "45 seconds", "Shooter be ready!"],
      parTime: 45,
      type: 'single_exposure'
    }
  ];

  const startBtn = document.getElementById('start');
  const stopBtn  = document.getElementById('stop');
  const muteChk  = document.getElementById('mute');
  const statusEl = document.getElementById('status');
  const turner   = document.getElementById('turner');
  const flipper  = document.getElementById('flipper');
  const img      = document.getElementById('targetImg');
  const big      = document.getElementById('big');
  const pBar     = document.getElementById('progressBar');
  const instructorBtn = document.getElementById('instructorBtn');
  const memberBtn = document.getElementById('memberBtn');
  const stageInfo = document.getElementById('stageInfo');
  const cornerStage = document.getElementById('cornerStage');
  const backFace = flipper.querySelector('.back');
  const continueScreen = document.getElementById('continueScreen');
  const continueTimer = document.getElementById('continueTimer');
  const continueYes = document.getElementById('continueYes');
  const continueNo = document.getElementById('continueNo');

  let state='idle', dTO=null, pTO=null, tAF=null, endTime=0, ac=null, continueTO=null, continueIV=null;
  let currentCourse = INSTRUCTOR_COF;
  let currentStageIndex = 0;

  function status(t){ statusEl.textContent=t; }
  function audio(){ if(!ac){ ac=new (window.AudioContext||window.webkitAudioContext)(); } if(ac.state==='suspended') ac.resume(); }
  function beep(f=1000,ms=160){
    if(muteChk.checked||!ac) return;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='square'; o.frequency.value=f; o.connect(g); g.connect(ac.destination);
    const n=ac.currentTime;
    g.gain.setValueAtTime(0.0001,n);
    g.gain.exponentialRampToValueAtTime(0.32,n+.01);
    g.gain.exponentialRampToValueAtTime(0.0001,n+ms/1000);
    o.start(n); o.stop(n+ms/1000+.02);
  }
  const startBeep=()=>beep(1200,180);
  const endBeep  =()=>{beep(880,220); setTimeout(()=>beep(660,180),180);};

  function say(text, onEndCallback){
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1; u.pitch = 1; u.volume = .9;

      let callbackFired = false;
      const onEnd = () => {
        if (callbackFired) return;
        callbackFired = true;
        if(onEndCallback) onEndCallback();
      };

      u.onend = onEnd;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);

      // Failsafe timeout in case onend doesn't fire in headless/test env
      setTimeout(onEnd, 2000);
    } catch(e) {
      console.error("Speech synthesis failed.", e);
      // If speech API is totally broken, fire callback immediately
      if(onEndCallback) setTimeout(onEndCallback, 100);
    }
  }
  function clearTimers(){ [dTO,pTO].forEach(t=>t&&clearTimeout(t)); if(tAF) cancelAnimationFrame(tAF); dTO=pTO=tAF=null; }

  function setFacing(isFacing){
    flipper.style.transform = isFacing ? 'rotateY(0deg)' : 'rotateY(180deg)';
    turner.classList.toggle('facing', isFacing);
    turner.classList.toggle('away',   !isFacing);
    img.classList.toggle('sway', isFacing);
  }
  function hideTarget(){ setFacing(false); }
  function showTarget(){
    const pick = TARGETS[(Math.random()*1e9|0)%TARGETS.length];
    pBar.style.backgroundColor = pick.includes('green') ? '#2bd97f' : '#00aaff';
    img.src = pick; // relative path inside repo
    setFacing(true);
    setTimeout(animatePaperFlap, 600); // 550ms for flip + 50ms buffer
  }

  function animatePaperFlap() {
    let angle = (Math.random() * 0.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);
    let delay = 0;

    for (let i = 0; i < 5; i++) {
      delay += Math.random() * 40 + 30;
      const currentAngle = angle;
      setTimeout(() => {
        img.style.transform = `rotateZ(${currentAngle}deg)`;
      }, delay);
      angle *= -0.6 * (Math.random() * 0.4 + 0.8);
    }

    setTimeout(() => {
      img.style.transform = `rotateZ(0deg)`;
    }, delay + 100);
  }

  function setCinemaMode(active){
    document.body.classList.toggle('cinema-active', active);
    stageInfo.style.opacity = active ? 0 : 1;
    cornerStage.style.opacity = active ? 1 : 0;
    if(active){
      cornerStage.textContent = currentCourse[currentStageIndex].name;
      backFace.textContent = '';
    } else {
      backFace.textContent = 'TARGET AWAY';
      cornerStage.textContent = '';
    }
  }

  function loadStage(stageIndex){
    setCinemaMode(false);
    clearTimers();
    state = 'idle';
    hideTarget();

    currentStageIndex = stageIndex;
    const stage = currentCourse[currentStageIndex];

    if(!stage){
      stageInfo.innerHTML = `<h2>Course Complete!</h2>`;
      startBtn.disabled = true;
      stopBtn.disabled = true;
      status('Done');
      return;
    }

    stageInfo.innerHTML = `<h2>${stage.name}</h2><p>${stage.instructions.join('<br>')}</p>`;
    big.textContent='–';
    big.classList.remove('warning');
    big.classList.add('hidden');
    pBar.style.width = '100%';
    pBar.style.backgroundColor = 'transparent';
    startBtn.textContent = `Start ${stage.name}`;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    instructorBtn.disabled = false;
    memberBtn.disabled = false;
    status('Ready');
  }

  function reset(){
    loadStage(0);
  }

  const randMs=(a,b)=>Math.round((Math.random()*(b-a)+a)*1000);
  function tick(){
    const stage = currentCourse[currentStageIndex];
    const remaining = endTime - Date.now();
    const total = stage.parTime * 1000;

    if(remaining <= 0){
      big.textContent = '00.00';
      pBar.style.width = '0%';
      return;
    }

    const seconds = remaining / 1000;
    big.textContent = seconds.toFixed(2).padStart(5, '0');
    pBar.style.width = `${(remaining/total)*100}%`;

    if (remaining < total * 0.1) {
      big.classList.add('warning');
    }

    if(stage.type === 'reload_prompt'){
      const seconds_remaining = remaining / 1000;
      if(seconds_remaining < stage.prompt_start && seconds_remaining > stage.prompt_end) {
        statusEl.textContent = 'RELOAD!';
      } else if (state === 'presenting') {
        statusEl.textContent = 'UP!';
      }
    }

    tAF = requestAnimationFrame(tick);
  }

  function showContinueScreen(){
    let count = 8;
    continueTimer.textContent = count;
    continueScreen.classList.remove('hidden');

    const advance = () => {
      clearInterval(continueIV);
      clearTimeout(continueTO);
      continueScreen.classList.add('hidden');
      loadStage(currentStageIndex + 1);
    }

    const repeat = () => {
      clearInterval(continueIV);
      clearTimeout(continueTO);
      continueScreen.classList.add('hidden');
      loadStage(currentStageIndex);
    }

    continueTO = setTimeout(advance, 8000);
    continueIV = setInterval(()=>{
      count--;
      if(count >= 0) continueTimer.textContent = count;
    }, 1000);

    continueYes.onclick = advance;
    continueNo.onclick = repeat;
  }

  function runSingleExposureStage(){
    setCinemaMode(true);
    const stage = currentCourse[currentStageIndex];
    big.classList.remove('warning');
    audio();
    state='standby';
    status('Standby…');
    startBtn.disabled=true;
    stopBtn.disabled=false;

    dTO = setTimeout(()=>{
      if(state!=='standby') return;
      endTime = Date.now() + stage.parTime * 1000;
      big.classList.remove('hidden');
      state='presenting';
      startBeep();
      showTarget();
      status('UP!');
      tick();

      pTO = setTimeout(()=>{
        endBeep();
        hideTarget();
        status('DOWN.');
        showContinueScreen();
      }, stage.parTime*1000);
    }, randMs(4, 12));
  }

  function runMultiRepStage(repsRemaining){
    if(repsRemaining <= 0) {
      loadStage(currentStageIndex + 1);
      return;
    }
    setCinemaMode(true);
    const stage = currentCourse[currentStageIndex];
    big.classList.remove('warning');
    audio();
    state='standby';
    stageInfo.innerHTML = `<h2>${stage.name}</h2><p>Rep ${stage.reps - repsRemaining + 1} of ${stage.reps}</p><p>...Standby...</p>`;
    status('Standby…');
    startBtn.disabled=true;
    stopBtn.disabled=false;

    dTO = setTimeout(() => {
      if (state !== 'standby') return;
      endTime = Date.now() + stage.parTime * 1000;
      big.classList.remove('hidden');
      state = 'presenting';
      startBeep();
      showTarget();
      status('UP!');
      tick();

      pTO = setTimeout(() => {
        endBeep();
        hideTarget();
        status('DOWN.');

        const delay = randMs(stage.delay_min, stage.delay_max);
        if (repsRemaining > 1) {
          stageInfo.innerHTML = `<h2>${stage.name}</h2><p>Next rep in ${(delay/1000).toFixed(1)} seconds...</p>`;
          setTimeout(() => runMultiRepStage(repsRemaining - 1), delay);
        } else {
          showContinueScreen();
        }
      }, stage.parTime * 1000);
    }, randMs(4, 12));
  }

  function playInstructionSlides(slides, onComplete){
    const slide = slides.shift(); // Get the next slide
    if(!slide){
      onComplete(); // All slides shown, run the onComplete callback
      return;
    }
    stageInfo.innerHTML = `<h2>${currentCourse[currentStageIndex].name}</h2><p>${slide}</p>`;
    say(slide, () => playInstructionSlides(slides, onComplete));
  }

  function start(){
    if(state!=='idle') return;
    const stage = currentCourse[currentStageIndex];
    if(!stage) return;

    startBtn.disabled = true;
    stopBtn.disabled = true;
    instructorBtn.disabled = true;
    memberBtn.disabled = true;

    const slides = [...stage.instructions];

    const startTheDrill = () => {
      if(stage.type === 'multi_rep') {
        runMultiRepStage(stage.reps);
      } else {
        runSingleExposureStage();
      }
    }

    playInstructionSlides(slides, startTheDrill);
  }

  startBtn.addEventListener('click', start);
  stopBtn .addEventListener('click', reset);
  document.addEventListener('keydown', e=>{
    if(e.code==='Space'){ e.preventDefault(); state==='idle' ? start() : reset(); }
    if(e.code==='Escape'){ e.preventDefault(); reset(); }
  });

  loadStage(0);
})();
</script>
</body>
</html>

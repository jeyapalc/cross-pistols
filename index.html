<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cross Pistols Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1117; --ui:#e7ebf2; --accent:#2bd97f;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ui);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column
  }
  header{padding:1rem;display:flex;gap:.75rem;align-items:center}
  #courseSelection { margin-right: auto; }
  #courseSelection button {
    background: transparent;
    color: var(--ui);
    opacity: 0.6;
    border: 1px solid var(--ui);
  }
  #courseSelection button.active {
    background: var(--accent);
    color: #062f1d;
    opacity: 1;
    border-color: var(--accent);
  }
  button{
    background:var(--accent);color:#062f1d;border:0;padding:.8rem 1rem;
    border-radius:.8rem;font-weight:800;cursor:pointer
  }
  .start-container { position: relative; display: flex; }
  #start { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  #stage-select-btn {
    background: var(--accent);
    color: #062f1d;
    border: 0;
    padding: .8rem .5rem;
    border-left: 1px solid rgba(6,47,29,0.3);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }
  #stage-select-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    background-color: var(--accent);
    border-radius: .5rem;
    padding: .5rem;
    z-index: 1000;
    min-width: 200px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
  #stage-select-dropdown a {
    display: block;
    padding: .5rem 1rem;
    color: #062f1d;
    text-decoration: none;
    border-radius: .3rem;
  }
  #stage-select-dropdown a:hover { background-color: rgba(6,47,29,0.2); }
  button:disabled{opacity:.55;cursor:not-allowed}
  #status{font-weight:800}
  main{flex:1;display:grid;place-items:center}
  #stageInfo {
    position: fixed;
    inset: 0;
    padding: 1rem;
    text-align: center;
    color: #cfd6e1;
    transition: opacity .3s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
    pointer-events: none;
 main
  }
  #stageInfo p { margin: 0; font-size: 20vh; line-height: 1; font-weight: 800; font-family: 'Archivo Black', sans-serif;}
  #stageInfo h2 {
    display: none;
    position: absolute;
    font-size: 15vh;
    color: #ff3c3c;
    text-shadow: 0 0 15px rgba(255,0,0,0.7);
    font-family: 'Archivo Black', sans-serif;
  }

  body.cinema-active header button,
  body.cinema-active #courseSelection button {
    opacity: 0.3;
    pointer-events: none;
  }
  body.cinema-active #stage {
    opacity: 1;
  }
  #cornerStage {
    position: fixed;
    bottom: 1rem;
    left: 1.5rem;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--ui);
    opacity: 0;
    transition: opacity .3s;
    z-index: 200;
  }
  #continueScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: rgba(0,0,0,0.7);
    text-align: center;
    z-index: 300;
    transition: opacity .3s;
  }
  #continueScreen h2 { font-size: 5rem; margin: 0; font-family: 'Archivo Black', sans-serif; }
  .continue-bar-container {
    width: 80%;
    max-width: 400px;
    height: 10px;
    background-color: rgba(255,255,255,0.2);
    border-radius: 5px;
    margin: 1rem 0;
  }
  #continueBar {
    width: 100%;
    height: 100%;
    background-color: var(--accent);
    border-radius: 5px;
    transition: width 10s linear;
  }
  #continueScreen button { min-width: 120px; }

  #stage{
    position:relative;width:min(66vmin,88vw);height:min(86vmin,82vh);
    display:grid;place-items:center;perspective:2200px;transform-style:preserve-3d;
    opacity: 0;
    transition: opacity .3s;
  }
  #big{
    position:absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Archivo Black', sans-serif;
    font-weight:900;
    font-size:min(108vmin, 84vh);
    line-height:.8;
    letter-spacing:-.03em;
    color:rgba(60, 60, 60, 0.3);
    user-select:none;
    pointer-events:none;
    text-shadow:none;
    z-index:0;
    transition: color .3s, text-shadow .3s, opacity .3s, filter .3s;
    filter: blur(1px);
  }
  #big.warning { -webkit-text-stroke: 1px #ff0000; }
  .hidden { display: none !important; }
  #progressBar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background-color: transparent;
    transition: width 0.1s linear, background-color 0.3s ease;
    z-index: 200;
  }
  .turner{width:100%;height:100%;position:relative;z-index:1;perspective:1400px}
  .flipper{
    position:absolute;inset:0;transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.7,.2,1);
  }
  .face{position:absolute;inset:0;display:grid;place-items:center;backface-visibility:hidden}
  .back{transform:rotateY(180deg); background-color: #1a1a1a;}
  .away .flipper{transform:rotateY(180deg)}
  .facing .flipper{transform:rotateY(0deg)}
  .paper{
    max-width:92%;max-height:96%;
    filter:drop-shadow(0 28px 60px rgba(0,0,0,.55));
    transform-origin:50% 10%;
  }
</style>
</head>
<body>
<header>
  <div id="courseSelection">
    <button id="instructorBtn" class="active">Instructor</button>
    <button id="memberBtn">Regular Member</button>
  </div>
  <div class="start-container">
    <button id="start">Start Course</button>
    <button id="stage-select-btn">▾</button>
    <div id="stage-select-dropdown" class="hidden"></div>
  </div>
  <button id="stop" disabled>Stop/Reset</button>
  <label><input type="checkbox" id="mute">Mute beeps</label>
  <div id="status" aria-live="polite">Idle</div>
</header>
<main>
  <div id="cornerStage"></div>
  <div id="stageInfo">
    <p></p>
    <h2>RELOAD!</h2>
  </div>
  <section id="stage" aria-label="training lane">
    <div id="big" class="hidden">–</div>
    <div class="turner away" id="turner">
      <div class="flipper" id="flipper">
        <div class="face front"><img id="targetImg" class="paper" alt="target"/></div>
        <div class="face back"></div>
      </div>
    </div>
  </section>
  <div id="continueScreen" class="hidden">
    <div class="continue-bar-container">
      <div id="continueBar"></div>
    </div>
    <div>
      <button id="continueReshoot">Reshoot</button>
      <button id="continueNext">Next Stage</button>
    </div>
  </div>
</main>
<div id="progressBar"></div>
<script>
(()=> {
  const TARGETS = ["images/green_peach_bg.png", "images/blue_peach_bg.png"];
  const INSTRUCTOR_COF = [
    { name: "Stage 1", instructions: ["Stage 1", "15 meters", "From holster", "4 standing, 4 kneeling", "22 seconds", "Shooter be ready!"], parTime: 22, type: 'single_exposure' },
    { name: "Stage 2", instructions: ["Stage 2", "7 meters", "From high ready", "2 rounds, reload, 2 rounds", "8 seconds", "Shooter be ready!"], parTime: 8, type: 'reload_prompt', prompt_start: 5, prompt_end: 3 },
    { name: "Stage 3", instructions: ["Stage 3", "5 meters", "From holster", "2 centre mass, 1 head", "5 seconds per rep", "3 repetitions", "Shooter be ready!"], parTime: 5, reps: 3, delay_min: 14, delay_max: 22, type: 'multi_rep' },
    { name: "Stage 4", instructions: ["Stage 4", "25 meters", "From holster", "3 standing", "3 standing, from cover", "3 kneeling, from cover", "45 seconds", "Shooter be ready!"], parTime: 45, type: 'single_exposure' }
  ];

  const startBtn = document.getElementById('start');
  const stopBtn  = document.getElementById('stop');
  const img      = document.getElementById('targetImg');
  const big      = document.getElementById('big');
  const pBar     = document.getElementById('progressBar');
  const turner   = document.getElementById('turner');
  const stageInfo = document.getElementById('stageInfo');
  const stageInfoP = stageInfo.querySelector('p');
  const reloadPrompt = stageInfo.querySelector('h2');
  const cornerStage = document.getElementById('cornerStage');
  const continueScreen = document.getElementById('continueScreen');
  const continueBar = document.getElementById('continueBar');
  const continueReshoot = document.getElementById('continueReshoot');
  const continueNext = document.getElementById('continueNext');
  const stageSelectBtn = document.getElementById('stage-select-btn');
  const stageSelectDropdown = document.getElementById('stage-select-dropdown');

  let state='idle', dTO=null, pTO=null, tAF=null, endTime=0;
  let currentCourse = INSTRUCTOR_COF;
  let currentStageIndex = 0;
  let continueTO = null, continueIV = null, repCounter = 0;

  function populateStageDropdown() {
    stageSelectDropdown.innerHTML = '';
    currentCourse.forEach((stage, index) => {
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = stage.name;
      a.dataset.stageIndex = index;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        loadStage(index);
        stageSelectDropdown.classList.add('hidden');
      });
      stageSelectDropdown.appendChild(a);
    });
  }

  function clearTimers(){ [dTO,pTO,continueTO,continueIV].forEach(t=>t&&clearTimeout(t)); if(tAF) cancelAnimationFrame(tAF); dTO=pTO=tAF=continueTO=continueIV=null; }
  function setFacing(isFacing){ turner.classList.toggle('facing', isFacing); turner.classList.toggle('away', !isFacing); }

  function setCinemaMode(active) {
    document.body.classList.toggle('cinema-active', active);
    stageInfo.style.opacity = active ? 0 : 1;
    cornerStage.style.opacity = active ? 1 : 0;
  }

  function animatePaperFlap() {
    const paper = document.getElementById('targetImg');
    setTimeout(() => { paper.style.transform = 'rotate(1.5deg)'; }, 0);
    setTimeout(() => { paper.style.transform = 'rotate(-1deg)'; }, 80);
    setTimeout(() => { paper.style.transform = 'rotate(0.5deg)'; }, 160);
    setTimeout(() => { paper.style.transform = ''; }, 240);
  }

  function loadStage(stageIndex) {
    clearTimers();
    setCinemaMode(false);
    reloadPrompt.style.display = 'none';
    state = 'idle';
    currentStageIndex = stageIndex;
    const stage = currentCourse[currentStageIndex];

    if (!stage) {
      stageInfoP.textContent = 'Course Complete';
      startBtn.disabled = true;
      stopBtn.disabled = true;
      return;
    }

    stageInfoP.textContent = stage.instructions[0];
    startBtn.textContent = `Start ${stage.name}`;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    big.classList.add('hidden');
    pBar.style.width = '100%';
    pBar.style.backgroundColor = 'transparent';
    setFacing(false);
    cornerStage.textContent = '';
  }

  function say(text, onEndCallback){
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1; u.pitch = 1; u.volume = .9;
      let cbFired = false;
      const onEnd = () => { if (!cbFired) { cbFired = true; if(onEndCallback) onEndCallback(); } };
      u.onend = onEnd;
      speechSynthesis.speak(u);
      setTimeout(onEnd, 2000);
    } catch(e) { if(onEndCallback) setTimeout(onEndCallback, 100); }
  }

  function playInstructionSlides(slides, onComplete){
    const slide = slides.shift();
    if(!slide){ onComplete(); return; }
    stageInfoP.textContent = slide;
    say(slide, () => playInstructionSlides(slides, onComplete));
  }

  function startDrill() {
    const stage = currentCourse[currentStageIndex];
    let initialPick = null;

    const runSingleDrill = (isFirstDrill, drillPick) => {
      state = 'standby';

      const delay = (stage.type === 'multi_rep' && !isFirstDrill)
        ? (Math.random() * (stage.delay_max - stage.delay_min) + stage.delay_min) * 1000
        : (Math.random() * 8000 + 4000);

      dTO = setTimeout(() => {
        if (state !== 'standby') return;

        setCinemaMode(true);
        const pick = drillPick || TARGETS[Math.floor(Math.random() * TARGETS.length)];
        img.src = pick;
        pBar.style.backgroundColor = pick.includes('green') ? '#2bd97f' : '#00aaff';

        const currentParTime = (stage.name === "Stage 3")
          ? (Math.random() * (11 - 8) + 8)
          : stage.parTime;

        endTime = Date.now() + currentParTime * 1000;
        state = 'presenting';
        setFacing(true);
        // setTimeout(animatePaperFlap, 550);
        big.classList.remove('hidden');
        tick();

        pTO = setTimeout(() => {
          setFacing(false);
          big.classList.add('hidden');

          if (stage.type === 'multi_rep') {
            repCounter++;
            if (repCounter < stage.reps) {
              cornerStage.textContent = `${stage.name} - Rep ${repCounter + 1}/${stage.reps}`;
              setCinemaMode(false);
              stageInfoP.textContent = "Shooter be ready!";
              runSingleDrill(false, drillPick);
            } else {
              showContinueScreen();
            }
          } else {
            showContinueScreen();
          }
        }, currentParTime * 1000);
      }, delay);
    };

    if (stage.type === 'multi_rep') {
      repCounter = 0;
      cornerStage.textContent = `${stage.name} - Rep 1/${stage.reps}`;
      initialPick = TARGETS[Math.floor(Math.random() * TARGETS.length)];
    }

    runSingleDrill(true, initialPick);
  }

  function tick(){
    const stage = currentCourse[currentStageIndex];
    const remaining = endTime - Date.now();

    if (stage.type === 'reload_prompt') {
      const remainingSeconds = remaining / 1000;
      if (remainingSeconds < stage.prompt_start && remainingSeconds > stage.prompt_end) {
        reloadPrompt.style.display = 'block';
      } else {
        reloadPrompt.style.display = 'none';
      }
    }

    if(remaining <= 0){
      big.textContent = '00.00';
      pBar.style.width = '0%';
      reloadPrompt.style.display = 'none';
      big.classList.remove('warning');
      return;
    }

    const seconds = Math.floor(remaining / 1000);
    const hundredths = Math.floor((remaining % 1000) / 10);
    big.textContent = `${seconds.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;

    if (remaining < stage.parTime * 100) { // 10% of par time in ms
      big.classList.add('warning');
    } else {
      big.classList.remove('warning');
    }

    pBar.style.width = `${(remaining/(stage.parTime*1000))*100}%`;
    tAF = requestAnimationFrame(tick);
  }

  function showContinueScreen(){
    // Reset the bar to full width instantly before showing
    continueBar.style.transition = 'none';
    continueBar.style.width = '100%';

    continueScreen.classList.remove('hidden');

    // Force a reflow to ensure the transition is applied correctly after reset
    void continueBar.offsetWidth;

    // Restore the transition property so the animation works
    continueBar.style.transition = 'width 10s linear';

    // Set the dynamic button text
    const nextStage = currentCourse[currentStageIndex + 1];
    if (nextStage) {
      continueNext.textContent = nextStage.name;
      continueNext.disabled = false;
    } else {
      continueNext.textContent = 'Course Complete';
      continueNext.disabled = true;
    }

    const cleanup = () => {
      clearTimeout(continueTO);
      continueScreen.classList.add('hidden');
    };

    const advance = () => { cleanup(); loadStage(currentStageIndex + 1); };
    const repeat = () => { cleanup(); loadStage(currentStageIndex); };

    // Set the 10-second timeout to advance
    continueTO = setTimeout(advance, 10000);

    // Trigger the bar animation
    setTimeout(() => {
        continueBar.style.width = '0%';
    }, 10); // Small delay to ensure the transition kicks in

    continueNext.onclick = advance;
    continueReshoot.onclick = repeat;
  }

  function start(){
    if (state !== 'idle') return;
    const stage = currentCourse[currentStageIndex];
    if (!stage) return;

    startBtn.disabled = true;
    stopBtn.disabled = false;

    const slides = [...stage.instructions];
    const stageTitle = slides.shift();
    cornerStage.textContent = stageTitle;
    playInstructionSlides(slides, startDrill);
  }

  function reset(){ loadStage(0); }

  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', reset);

  stageSelectBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    stageSelectDropdown.classList.toggle('hidden');
  });

  document.addEventListener('click', () => {
    if (!stageSelectDropdown.classList.contains('hidden')) {
      stageSelectDropdown.classList.add('hidden');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); state === 'idle' ? start() : reset(); }
    if (e.code === 'Escape') { e.preventDefault(); reset(); }

    if (state === 'idle') {
      if (e.code === 'ArrowUp' || e.code === 'ArrowLeft') {
        e.preventDefault();
        if (currentStageIndex > 0) {
          loadStage(currentStageIndex - 1);
        }
      }
      if (e.code === 'ArrowDown' || e.code === 'ArrowRight') {
        e.preventDefault();
        if (currentStageIndex < currentCourse.length - 1) {
          loadStage(currentStageIndex + 1);
        }
      }
    }
  });

  loadStage(0);
  populateStageDropdown();
})();
</script>
</body>
</html>

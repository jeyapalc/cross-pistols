<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cross Pistols Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech+Mono&family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1117; --ui:#e7ebf2; --accent:#2bd97f;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ui);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column
  }
  header{padding:1rem;display:flex;gap:.75rem;align-items:center}
  #courseSelection { margin-right: auto; }
  #courseSelection button {
    background: transparent;
    color: var(--ui);
    opacity: 0.6;
    border: 1px solid var(--ui);
  }
  #courseSelection button.active {
    background: var(--accent);
    color: #062f1d;
    opacity: 1;
    border-color: var(--accent);
  }
  button{
    background:var(--accent);color:#062f1d;border:0;padding:.8rem 1rem;
    border-radius:.8rem;font-weight:800;cursor:pointer
  }
  .start-container { position: relative; display: flex; }
  #start { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  #stage-select-btn {
    background: var(--accent);
    color: #062f1d;
    border: 0;
    padding: .8rem .5rem;
    border-left: 1px solid rgba(6,47,29,0.3);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }
  #stage-select-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    background-color: var(--accent);
    border-radius: .5rem;
    padding: .5rem;
    z-index: 1000;
    min-width: 200px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
  #stage-select-dropdown a {
    display: block;
    padding: .5rem 1rem;
    color: #062f1d;
    text-decoration: none;
    border-radius: .3rem;
  }
  #stage-select-dropdown a:hover { background-color: rgba(6,47,29,0.2); }
  button:disabled{opacity:.55;cursor:not-allowed}
  #status{font-weight:800}
  main{flex:1;display:grid;place-items:center}
  #stageInfo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    height: 40vh;
    z-index: 20;
    color: white;
    transition: opacity .3s;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    backdrop-filter: blur(5px);
  }
  #stageInfo {
    flex-direction: row;
    align-items: center;
    justify-content: space-around;
    gap: 2rem;
  }
  #instructionText {
    font-family: 'Silkscreen', sans-serif;
    font-size: 3.5vh;
    line-height: 1.6;
    white-space: pre-wrap;
    text-align: left;
    flex-basis: 50%;
  }
  #readyText {
    font-family: 'Press Start 2P', cursive;
    font-size: 6vh;
    flex-basis: 50%;
    text-align: center;
  }
  @keyframes flash-red {
    0%, 49% { color: #ff3c3c; text-shadow: 0 0 5px #ff3c3c, 0 0 12px #ff3c3c; }
    50%, 100% { color: white; text-shadow: none; }
  }
  .flashing-red {
    animation: flash-red 1.2s infinite steps(1, end);
  }
  .text-bold-red {
    color: #ff3c3c;
    font-weight: bold;
  }
  #stageText {
    font-family: 'Press Start 2P', cursive;
    font-size: 15vh;
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    color: var(--ui);
  }
  #stageNumberBg {
    font-family: 'Archivo Black', sans-serif;
    font-size: 85vmin;
    font-weight: 900;
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    color: transparent;
    -webkit-text-stroke-width: 4px;
    -webkit-text-stroke-color: #2BF97F;
    text-shadow: 0 0 10px rgba(43, 217, 127, 0.7), 0 0 20px rgba(43, 217, 127, 0.5);
    pointer-events: none;
  }
  @keyframes flipIn {
    from {
      transform: rotateX(-90deg);
      opacity: 0;
    }
    to {
      transform: rotateX(0deg);
      opacity: 1;
    }
  }
  #stageInfo p.flipping {
    animation: flipIn 0.4s ease-in-out;
  }
  #reshootHud {
    position: fixed;
    top: 1rem;
    left: 1rem;
    background-color: rgba(0, 0, 0, 0.8);
    border: 2px solid var(--accent);
    padding: 1rem;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    color: var(--accent);
    width: 350px;
    z-index: 400;
    white-space: pre-wrap;
  }
  #stageInfo h2 {
    display: none;
    position: absolute;
    font-size: 15vh;
    color: #ff3c3c;
    text-shadow: 0 0 15px rgba(255,0,0,0.7);
    font-family: 'Archivo Black', sans-serif;
  }

  body.cinema-active header button,
  body.cinema-active #courseSelection button {
    opacity: 0.3;
    pointer-events: none;
  }
  body.cinema-active #stage {
    opacity: 1;
  }
  #cornerStage {
    position: fixed;
    bottom: 1rem;
    left: 1.5rem;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--ui);
    opacity: 0;
    transition: opacity .3s;
    z-index: 200;
  }
  #continueScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: rgba(0,0,0,0.7);
    text-align: center;
    z-index: 300;
    transition: opacity .3s;
  }
  #continueScreen h2 { font-size: 5rem; margin: 0; font-family: 'Archivo Black', sans-serif; }
  .continue-bar-container {
    width: 80%;
    max-width: 400px;
    height: 10px;
    background-color: rgba(255,255,255,0.2);
    border-radius: 5px;
    margin: 1rem 0;
  }
  #continueBar {
    width: 100%;
    height: 100%;
    background-color: var(--accent);
    border-radius: 5px;
    transition: width 10s linear;
  }
  #continueScreen button { min-width: 120px; }

  #stage{
    position:relative;width:min(66vmin,88vw);height:min(86vmin,82vh);
    display:grid;place-items:center;perspective:2200px;transform-style:preserve-3d;
    opacity: 0;
    transition: opacity .3s;
  }
  #ring-timer {
    display: none;
    width: 60vmin;
    height: 60vmin;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    opacity: 0;
    transition: opacity .3s;
  }
  #ring-timer.visible {
    opacity: 1;
  }
  #ring-timer::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    height: 90%;
    background-color: var(--bg);
    border-radius: 50%;
  }
  #big{
    position:absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Archivo Black', sans-serif;
    font-weight:900;
    font-size: 95vmin;
    line-height:.8;
    letter-spacing:-.03em;
    color:rgba(60, 60, 60, 0.3);
    user-select:none;
    pointer-events:none;
    text-shadow:none;
    z-index:0;
    transition: color .3s, text-shadow .3s, opacity .3s, filter .3s;
  }
  #big.warning {
    -webkit-text-stroke: 1px #ff0000;
    color: transparent;
  }
  .hidden { display: none !important; }
  #progressBar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background-color: transparent;
    transition: width 0.1s linear, background-color 0.3s ease;
    z-index: 200;
  }
  .turner{width:100%;height:100%;position:relative;z-index:1;perspective:1400px}
  .flipper{
    position:absolute;inset:0;transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.7,.2,1);
  }
  .face{position:absolute;inset:0;display:grid;place-items:center;backface-visibility:hidden}
  .back{transform:rotateY(180deg); background-color: #1a1a1a;}
  .away .flipper{transform:rotateY(180deg)}
  .facing .flipper{transform:rotateY(0deg)}
  .paper{
    max-width:92%;max-height:96%;
    filter:drop-shadow(0 28px 60px rgba(0,0,0,.55));
    transform-origin:50% 10%;
  }
</style>
</head>
<body>
<header>
  <div id="courseSelection">
    <button id="instructorBtn" class="active">Instructor</button>
    <button id="memberBtn">Regular Member</button>
  </div>
  <div class="start-container">
    <button id="start">Start Course</button>
    <button id="stage-select-btn">▾</button>
    <div id="stage-select-dropdown" class="hidden"></div>
  </div>
  <button id="stop" disabled>Stop/Reset</button>
  <label><input type="checkbox" id="mute">Mute beeps</label>
  <div id="status" aria-live="polite">Idle</div>
</header>
<main>
  <div id="cornerStage" style="opacity: 0;"></div>
  <div id="stageNumberBg"></div>
  <div id="stageInfo">
    <div id="instructionText"></div>
    <div id="readyText"></div>
    <div id="stageText" class="hidden">STAGE</div>
    <h2>RELOAD!</h2>
  </div>
  <section id="stage" aria-label="training lane">
    <div id="ring-timer"></div>
    <div id="big" class="hidden">–</div>
    <div class="turner away" id="turner">
      <div class="flipper" id="flipper">
        <div class="face front"><img id="targetImg" class="paper" alt="target"/></div>
        <div class="face back"></div>
      </div>
    </div>
  </section>
  <div id="reshootHud" class="hidden"></div>
  <div id="continueScreen" class="hidden">
    <div class="continue-bar-container">
      <div id="continueBar"></div>
    </div>
    <div>
      <button id="continueReshoot">Reshoot</button>
      <button id="continueNext">Next Stage</button>
    </div>
  </div>
</main>
<div id="progressBar"></div>
<script>
(()=> {
  const INSTRUCTOR_COF = [
    { name: "Stage 1", target: "images/1-01-01 (1).svg", parTime: 22, type: 'single_exposure',
        short_instructions: { start_pos: "From Holster", distance: "15m", time_limit: "22s", sequence: "4 Rounds, Kneel, 4 Rounds" } },
    { name: "Stage 2", target: "images/2-01 (2).svg", parTime: 8, type: 'reload_prompt', prompt_start: 5, prompt_end: 3,
        short_instructions: { start_pos: "High Ready", distance: "7m", time_limit: "8s", sequence: "2 Rounds, Reload, 2 Rounds" } },
    { name: "Stage 3", target: "images/1-01-01 (1).svg", parTime: 5, reps: 3, delay_min: 8, delay_max: 12, type: 'multi_rep',
        short_instructions: { start_pos: "From Holster", distance: "5m", time_limit: "5s", sequence: "2 rds Center, 1 rd Head (x3)" } },
    { name: "Stage 4", target: "images/2-01 (2).svg", parTime: 45, type: 'single_exposure',
        short_instructions: { start_pos: "From Holster", distance: "25m", time_limit: "45s", sequence: "3 rds Standing, 3 rds Stand/Cover, 3 rds Kneel/Cover" } }
  ];

  const REGULAR_MEMBER_COF = [
    { name: "Stage 1", target: "images/1-01-01 (1).svg", parTime: 30, type: 'single_exposure',
        short_instructions: { start_pos: "From Holster", distance: "15m", time_limit: "30s", sequence: "4 rds Standing, 4 rds Kneeling" } },
    { name: "Stage 2", target: "images/2-01 (2).svg", parTime: 10, type: 'reload_prompt', prompt_start: 7, prompt_end: 4,
        short_instructions: { start_pos: "From Holster", distance: "7m", time_limit: "10s", sequence: "Challenge, 2 rds, Reload, 2 rds" } },
    {
      name: "Stage 3",
      type: 'hard_splits',
      target: "images/1-01-01 (1).svg",
      delay_min: 8,
      delay_max: 13,
      blocks: [
        { parTime: 4, target: "images/1-01-01 (1).svg", startPosition: 'holster',
            short_instructions: { start_pos: "From Holster", distance: "5m", time_limit: "4s", sequence: "1 rd Center, 1 rd Head" } },
        { parTime: 5, target: "images/2-01 (2).svg", startPosition: 'holster',
            short_instructions: { start_pos: "From Holster", distance: "5m", time_limit: "5s", sequence: "2 rds Center, 1 rd Head" } },
        { parTime: 5, target: "images/1-01-01 (1).svg", startPosition: 'high_ready',
            short_instructions: { start_pos: "High Ready", distance: "5m", time_limit: "5s", sequence: "2 rds Center, 2 rds Head" } }
      ]
    },
    { name: "Stage 4", target: "images/2-01 (2).svg", parTime: 60, type: 'single_exposure',
        short_instructions: { start_pos: "From Holster", distance: "25m", time_limit: "60s", sequence: "3 rds Standing, 3 rds Stand/Cover, 3 rds Kneel/Cover" } }
  ];

  const startBtn = document.getElementById('start');
  const stopBtn  = document.getElementById('stop');
  const img      = document.getElementById('targetImg');
  const big      = document.getElementById('big');
  const pBar     = document.getElementById('progressBar');
  const turner   = document.getElementById('turner');
  const stageInfo = document.getElementById('stageInfo');
  const instructionText = document.getElementById('instructionText');
  const readyText = document.getElementById('readyText');
  const stageText = document.getElementById('stageText');
  const stageNumberBg = document.getElementById('stageNumberBg');
  const reloadPrompt = stageInfo.querySelector('h2');
  const cornerStage = document.getElementById('cornerStage');
  const continueScreen = document.getElementById('continueScreen');
  const continueBar = document.getElementById('continueBar');
  const continueReshoot = document.getElementById('continueReshoot');
  const continueNext = document.getElementById('continueNext');
  const reshootHud = document.getElementById('reshootHud');
  const stageSelectBtn = document.getElementById('stage-select-btn');
  const stageSelectDropdown = document.getElementById('stage-select-dropdown');
  const instructorBtn = document.getElementById('instructorBtn');
  const memberBtn = document.getElementById('memberBtn');
  const ringTimer = document.getElementById('ring-timer');

  let state='idle', dTO=null, pTO=null, tAF=null, endTime=0;
  let currentCourse = INSTRUCTOR_COF;
  let currentStageIndex = 0;
  let continueTO = null, continueIV = null, repCounter = 0;

  function populateStageDropdown() {
    stageSelectDropdown.innerHTML = '';
    currentCourse.forEach((stage, index) => {
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = stage.name;
      a.dataset.stageIndex = index;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        loadStage(index);
        stageSelectDropdown.classList.add('hidden');
      });
      stageSelectDropdown.appendChild(a);
    });
  }

  function clearTimers(){ [dTO,pTO,continueTO,continueIV].forEach(t=>t&&clearTimeout(t)); if(tAF) cancelAnimationFrame(tAF); dTO=pTO=tAF=continueTO=continueIV=null; }
  function setFacing(isFacing){ turner.classList.toggle('facing', isFacing); turner.classList.toggle('away', !isFacing); }

  function setCinemaMode(active) {
    document.body.classList.toggle('cinema-active', active);
    stageInfo.style.opacity = active ? 0 : 1;
    cornerStage.style.opacity = 0;
  }

  function animatePaperFlap() {
    const paper = document.getElementById('targetImg');
    setTimeout(() => { paper.style.transform = 'rotate(1.5deg)'; }, 0);
    setTimeout(() => { paper.style.transform = 'rotate(-1deg)'; }, 80);
    setTimeout(() => { paper.style.transform = 'rotate(0.5deg)'; }, 160);
    setTimeout(() => { paper.style.transform = ''; }, 240);
  }

  function loadStage(stageIndex) {
    clearTimers();
    setCinemaMode(false);
    reloadPrompt.style.display = 'none';
    readyText.classList.remove('flashing-red');
    state = 'idle';
    currentStageIndex = stageIndex;
    const stage = currentCourse[currentStageIndex];

    if (!stage) {
      instructionText.textContent = 'Course Complete';
      startBtn.disabled = true;
      stopBtn.disabled = true;
      return;
    }

    const stageNumber = stage.name.replace('Stage ', '');
    stageNumberBg.textContent = stageNumber;
    instructionText.textContent = '';
    readyText.textContent = '';
    stageText.classList.remove('hidden');

    startBtn.textContent = `Start ${stage.name}`;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    big.classList.add('hidden');
    pBar.style.width = '100%';
    pBar.style.backgroundColor = 'transparent';
    setFacing(false);
  }


  function playBeep(frequency, duration) {
    if (document.getElementById('mute').checked) return;
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

      gainNode.connect(audioContext.destination);
      oscillator.connect(gainNode);

      const now = audioContext.currentTime;
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(1, now + 0.02);
      gainNode.gain.linearRampToValueAtTime(0, now + (duration / 1000));

      oscillator.start(now);
      oscillator.stop(now + (duration / 1000));
    } catch (e) {
      console.error("Web Audio API is not supported in this browser.", e);
    }
  }


  function startDrill() {
    const stage = currentCourse[currentStageIndex];

    const runSingleDrill = (isFirstDrill, drillPick, parTime) => {
      state = 'standby';

      const currentParTime = parTime || stage.parTime;
      const delay = (stage.type === 'multi_rep' && !isFirstDrill)
        ? (Math.random() * (stage.delay_max - stage.delay_min) + stage.delay_min) * 1000
        : (Math.random() * 8000 + 4000);

      dTO = setTimeout(() => {
        if (state !== 'standby') return;

        if (readyText.textContent) {
          readyText.textContent = '';
          readyText.classList.remove('flashing-red');
        }
        playBeep(1500, 750);
        setCinemaMode(true);
        const pick = drillPick || stage.target;
        img.src = pick;
        pBar.style.backgroundColor = 'var(--accent)';

        endTime = Date.now() + currentParTime * 1000;
        state = 'presenting';
        setFacing(true);
        big.classList.remove('hidden');
        ringTimer.classList.add('visible');
        tick();

        pTO = setTimeout(() => {
          setFacing(false);
          big.classList.add('hidden');
          ringTimer.classList.remove('visible');

          if (stage.type === 'multi_rep') {
            repCounter++;
            setCinemaMode(false);
            if (repCounter < stage.reps) {
              readyText.textContent = "Shooter be ready!";
              readyText.classList.add('flashing-red');
              runSingleDrill(false, stage.target);
            } else {
              showContinueScreen();
            }
          } else if (stage.type === 'hard_splits') {
          }
          else {
            showContinueScreen();
          }
        }, currentParTime * 1000);
      }, delay);
    };

    if (stage.type === 'hard_splits') {
      let currentBlockIndex = 0;
      const runNextBlock = () => {
        if (currentBlockIndex >= stage.blocks.length) {
          showContinueScreen();
          return;
        }
        const block = stage.blocks[currentBlockIndex];
        state = 'standby';
        runSingleDrill(true, block.target, block.parTime);
        pTO = setTimeout(() => {
            currentBlockIndex++;
            setCinemaMode(false);
            if (currentBlockIndex < stage.blocks.length) {
                const resetDelay = (Math.random() * (stage.delay_max - stage.delay_min) + stage.delay_min) * 1000;
                setTimeout(runNextBlock, resetDelay);
            } else {
                runNextBlock();
            }
        }, block.parTime * 1000);
      };
      runNextBlock();
    } else if (stage.type === 'multi_rep') {
      repCounter = 0;
      runSingleDrill(true, stage.target);
    } else if (stage.type === 'reload_prompt') {
      runSingleDrill(true, stage.target);
    } else {
      runSingleDrill(true, stage.target);
    }
  }

  function tick(){
    const stage = currentCourse[currentStageIndex];
    const remaining = endTime - Date.now();


    if(remaining <= 0){
      big.textContent = '00.00';
      pBar.style.width = '0%';
      big.classList.remove('warning');
      return;
    }

    const seconds = Math.floor(remaining / 1000);
    const hundredths = Math.floor((remaining % 1000) / 10);
    big.textContent = `${seconds.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;

    if (remaining < stage.parTime * 100) { // 10% of par time in ms
      big.classList.add('warning');
    } else {
      big.classList.remove('warning');
    }

    pBar.style.width = `${(remaining/(stage.parTime*1000))*100}%`;

    const remainingPercentage = (remaining / (stage.parTime * 1000)) * 100;
    ringTimer.style.background = `conic-gradient(var(--accent) ${remainingPercentage}%, transparent 0)`;

    tAF = requestAnimationFrame(tick);
  }

  function showContinueScreen(){
    document.getElementById('stage').style.opacity = 0;
    continueBar.style.transition = 'none';
    continueBar.style.width = '100%';

    continueScreen.classList.remove('hidden');

    void continueBar.offsetWidth;

    continueBar.style.transition = 'width 10s linear';

    const nextStage = currentCourse[currentStageIndex + 1];
    if (nextStage) {
      continueNext.textContent = nextStage.name;
      continueNext.disabled = false;
    } else {
      continueNext.textContent = 'Course Complete';
      continueNext.disabled = true;
    }

    const cleanup = () => {
      clearTimeout(continueTO);
      continueScreen.classList.add('hidden');
    };

    const advance = () => { cleanup(); loadStage(currentStageIndex + 1); };
    const repeat = () => {
      cleanup();
      loadStage(currentStageIndex);
      setTimeout(() => startBtn.click(), 100);
    };

    continueTO = setTimeout(advance, 10000);

    setTimeout(() => {
        continueBar.style.width = '0%';
    }, 10);

    continueNext.onclick = advance;
    continueReshoot.onclick = repeat;
  }

  function start(){
    if (state !== 'idle') return;
    const stage = currentCourse[currentStageIndex];
    if (!stage) return;

    startBtn.disabled = true;
    stopBtn.disabled = false;

    startDrill();
  }

  function reset(){ loadStage(0); }

  instructorBtn.addEventListener('click', () => {
    if (currentCourse === INSTRUCTOR_COF) return;
    currentCourse = INSTRUCTOR_COF;
    instructorBtn.classList.add('active');
    memberBtn.classList.remove('active');
    reset();
    populateStageDropdown();
  });

  memberBtn.addEventListener('click', () => {
    if (currentCourse === REGULAR_MEMBER_COF) return;
    currentCourse = REGULAR_MEMBER_COF;
    memberBtn.classList.add('active');
    instructorBtn.classList.remove('active');
    reset();
    populateStageDropdown();
  });

  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', reset);

  stageSelectBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    stageSelectDropdown.classList.toggle('hidden');
  });

  document.addEventListener('click', () => {
    if (!stageSelectDropdown.classList.contains('hidden')) {
      stageSelectDropdown.classList.add('hidden');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); state === 'idle' ? start() : reset(); }
    if (e.code === 'Escape') { e.preventDefault(); reset(); }

    if (state === 'idle') {
      if (e.code === 'ArrowUp' || e.code === 'ArrowLeft') {
        e.preventDefault();
        if (currentStageIndex > 0) {
          loadStage(currentStageIndex - 1);
        }
      }
      if (e.code === 'ArrowDown' || e.code === 'ArrowRight') {
        e.preventDefault();
        if (currentStageIndex < currentCourse.length - 1) {
          loadStage(currentStageIndex + 1);
        }
      }
    }

    if (!continueScreen.classList.contains('hidden')) {
      if (e.code === 'ArrowLeft') {
        e.preventDefault();
        document.getElementById('continueReshoot').click();
      }
      if (e.code === 'ArrowRight') {
        e.preventDefault();
        document.getElementById('continueNext').click();
      }
    }
  });

  loadStage(0);
  populateStageDropdown();
})();
</script>
</body>
</html>
